micronaut.application.name=swiss-travel-advisor

# Preferred demo setup: share the same Oracle ADB environment variables as
# ../pet-vector-search. Micronaut-native DATASOURCES_DEFAULT_* environment
# variables still override these application defaults when present.
datasources.default.db-type=oracle
datasources.default.dialect=ORACLE
datasources.default.driverClassName=oracle.jdbc.OracleDriver
datasources.default.url=${ORACLE_JDBC_URL:}
datasources.default.username=${DB_USERNAME:ADMIN}
datasources.default.password=${DB_PASSWORD:}

flyway.datasources.default.enabled=true
flyway.datasources.default.validate-on-migrate=false

langchain4j.open-ai.api-key=${OPENAI_API_KEY}
langchain4j.open-ai.chat-model.model-name=gpt-4o
langchain4j.open-ai.chat-model.timeout=60s

langchain4j.open-ai.embedding-model.model-name=text-embedding-3-small
langchain4j.open-ai.embedding-model.timeout=60s
